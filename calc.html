<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>FlexiCalc - Számológép</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; background: #eef2f3; }
        .calc { background: #333; padding: 20px; border-radius: 10px; width: 220px; }
        #display { width: 90%; height: 40px; background: white; margin-bottom: 15px; text-align: right; font-size: 20px; padding: 5px; border-radius: 4px; border: none; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border-radius: 4px; border: none; }
        .op { background: #ff9500; color: white; }
        .clear { background: #ff3b30; color: white; }
    </style>
</head>
<body>

<div class="calc">
    <input type="text" id="display" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')" class="op">/</button>
        <button onclick="appendValue('*')" class="op">*</button>
        <button onclick="appendValue('-')" class="op">-</button>
        <button onclick="appendValue('7')">7</button><button onclick="appendValue('8')">8</button><button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="op">+</button>
        <button onclick="appendValue('4')">4</button><button onclick="appendValue('5')">5</button><button onclick="appendValue('6')">6</button>
        <button onclick="calculate()" class="op" style="grid-row: span 2; height: 100%;">=</button>
        <button onclick="appendValue('1')">1</button><button onclick="appendValue('2')">2</button><button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('0')" style="grid-column: span 2; width: 100%;">0</button><button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch (e) { display.value = 'Hiba'; }
    }
</script>

</body>
</html>
